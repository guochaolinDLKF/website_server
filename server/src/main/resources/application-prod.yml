# ============================================================
# 生产环境配置（application-prod.yml）
# 
# 适用场景：正式上线的生产服务器
# 特点：日志精简、Swagger 关闭、连接池最大、只输出必要信息
# ============================================================

# ---------- MySQL 连接变量（operations = website 后台库，主库，读写） ----------
mysql:
  host: 47.100.111.124                  # 生产数据库 IP
  port: 23306                            # 数据库端口
  database: operations               # 数据库名
  username: ydzz               # 用户名
  password: 'ydzz.@KeJi#.'             # 密码

# ---------- MySQL 连接变量（zhouyi = APP 业务库，从库，只读）—— 待填写真实数据 ----------
# 说明：留空不影响启动（zhouyi 数据源 lazy=true，首次使用才连接）。
mysql-zhouyi:
  host: 47.101.202.247                              # TODO 待填写：zhouyi 生产库 IP
  port: 23306                           # TODO 待填写：端口
  database: zhouyi                      # 数据库名
  username: ydzz                          # TODO 待填写：用户名
  password: 'yd.zzCC#$keji'                          # TODO 待填写：密码

# ---------- Redis 连接变量 ----------
redis:
  host: 47.100.111.124                  # 生产 Redis IP
  port: 26379                            # Redis 端口
  password: "ydzz.@KeJi#."                          # Redis 密码
  database: 5                           # 数据库编号

# ---------- 高德地图 IP 定位（登录/操作日志 地区解析；沿用 VisitInfoServiceImpl 的 Key） ----------
amap:
  key: 'a0aea882477a1b77b97eee0e8fc07a30'   # 高德 Web 服务 Key（IP 定位）；国内 IP 精确到省/市，国外用 ip-api 取国家城市并标记异常

# ---------- 本机公网 IP echo 服务（本地开发取「当前设备所在网络的外网IP」） ----------
ip:
  echo-url: 'http://ip-api.com/line/?fields=query'   # 取本机公网IP(纯文本，HTTP)；生产环境优先用 X-Forwarded-For，不依赖此项

# ============================================================
# Spring 框架配置
# ============================================================
spring:
  application:
    name: server                        # 应用名称

  # ---------- 数据源（动态多数据源：operations 主库读写 + zhouyi 只读从库） ----------
  datasource:
    dynamic:
      primary: operations               # 默认主库
      strict: true                      # @DS 指定的数据源不存在时报错
      druid:                            # 全局 Druid 连接池默认参数
        initial-size: 20                # 启动时初始连接数（生产环境适当增大）
        min-idle: 20                    # 最小空闲连接数
        max-active: 200                 # 最大活跃连接数（根据并发量调整）
        max-wait: 60000                 # 获取连接最大等待时间
        validation-query: SELECT 1      # 连接有效性检测
        test-while-idle: true           # 空闲时检测
      datasource:
        operations:
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://${mysql.host}:${mysql.port}/${mysql.database}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
          username: ${mysql.username}
          password: ${mysql.password}
        # 从库：zhouyi（APP 业务库，只读）。值见上方 mysql-zhouyi 变量，留空时不连接。
        zhouyi:
          lazy: true                    # 延迟初始化：启动不连接，首次使用才连接
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://${mysql-zhouyi.host}:${mysql-zhouyi.port}/${mysql-zhouyi.database}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
          username: ${mysql-zhouyi.username}
          password: ${mysql-zhouyi.password}

  # ---------- Redis ----------
  data:
    redis:
      host: ${redis.host}
      port: ${redis.port}
      password: ${redis.password}
      database: ${redis.database}
      timeout: 10000ms

  # ---------- Redisson ----------
  redis:
    redisson:
      config: |
        singleServerConfig:
          address: "redis://${redis.host}:${redis.port}"
          password: ${redis.password}
          database: ${redis.database}
          connectionPoolSize: 64
          connectionMinimumIdleSize: 24
        codec: !<org.redisson.client.codec.StringCodec> {}


# ============================================================
# MyBatis Plus 配置
# ============================================================
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml  # XML 映射文件位置
  type-aliases-package: com.ydzz.entity          # 实体类包


# ============================================================
# Sa-Token 认证配置
# ============================================================
sa-token:
  token-name: Authorization             # Token 请求头名称
  timeout: 259200                       # 有效期（秒），3 天
  is-concurrent: true                   # 允许并发登录
  is-share: true                        # 共用 Token
  is-log: false                         # 生产环境关闭操作日志（减少日志量）
  is-read-header: true                  # 从请求头读取 Token


# ============================================================
# JetCache 缓存配置
# ============================================================
jetcache:
  remote:                               # 只配远程缓存（Redis），本地缓存按需开启
    default:
      database: ${redis.database}
      type: redisson                    # 通过 Redisson 连接 Redis
      keyConvertor: fastjson2
      valueEncoder: java
      valueDecoder: java
      defaultExpireInMillis: 3600000    # 默认 1 小时过期
      keyPrefix: "jetcache:"
  local:                                # 本地缓存（生产环境谨慎使用，注意内存占用）
    default:
      type: caffeine
      keyConvertor: fastjson2
      expireAfterWriteInMillis: 3600000


# ============================================================
# Swagger 配置（生产环境必须关闭！）
# ============================================================
springdoc:
  enabled: false                        # 生产环境关闭 Swagger，防止接口泄露


# ============================================================
# 健康检查配置
# ============================================================
health:
  check:
    interval-ms: 600000                 # 10 分钟检查一次（生产环境频率降低）


# ============================================================
# 日志配置（生产环境 — 精简，只记录关键信息和异常）
# ============================================================
logging:
  level:
    # ------ 应用代码 ------
    com.ydzz: info                      # 应用业务日志

    # ------ Spring 框架 ------
    org.springframework: warn           # 框架主体
    org.springframework.web: warn       # Web 层
    org.springframework.boot: warn      # 启动信息

    # ------ 数据库（生产不打印 SQL） ------
    org.mybatis: warn
    org.springframework.jdbc: warn
    org.springframework.transaction: warn
    com.alibaba.druid: warn

    # ------ 缓存 ------
    com.alicp.jetcache: warn
    org.springframework.cache: warn

    # ------ Redis（只记录严重错误） ------
    org.redisson: error
    org.springframework.data.redis: error

    # ------ 认证 ------
    cn.dev33.satoken: warn

    # ------ Web 容器（只记录严重错误） ------
    org.apache.catalina: error

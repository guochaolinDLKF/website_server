<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC端扫码支付 - 算命系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .payment-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }
        
        .payment-header {
            margin-bottom: 30px;
        }
        
        .payment-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .payment-header p {
            color: #666;
            font-size: 16px;
        }
        
        .order-info {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .order-info h3 {
            color: #333;
            margin-bottom: 15px;
        }
        
        .order-detail {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        
        .order-detail:last-child {
            border-bottom: none;
            font-weight: bold;
            color: #e74c3c;
            font-size: 18px;
        }
        
        .payment-methods {
            margin-bottom: 30px;
        }
        
        .payment-method {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .payment-method:hover {
            border-color: #007bff;
            background: #f0f8ff;
        }
        
        .payment-method.active {
            border-color: #007bff;
            background: #e3f2fd;
        }
        
        .payment-method-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .payment-icon {
            width: 40px;
            height: 40px;
            margin-right: 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }
        
        .wechat-icon {
            background: #1aad19;
        }
        
        .alipay-icon {
            background: #1677ff;
        }
        
        .payment-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
        
        .qr-code-container {
            text-align: center;
            margin-top: 20px;
        }
        
        .qr-code {
            width: 200px;
            height: 200px;
            border: 1px solid #ddd;
            border-radius: 10px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
            color: #666;
        }
        
        .qr-code img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 8px;
        }
        
        .payment-tips {
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .payment-status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
        }
        
        .status-pending {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        
        .status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status-failed {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .countdown {
            color: #e74c3c;
            font-weight: bold;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #007bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        
        .btn:hover {
            background: #0056b3;
        }
        
        .btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="payment-container">
        <div class="payment-header">
            <h1>扫码支付</h1>
            <p>请选择支付方式并扫描二维码完成支付</p>
        </div>
        
        <div class="order-info">
            <h3>订单信息</h3>
            <div class="order-detail">
                <span>商品名称：</span>
                <span id="itemName">算命系统VIP权益</span>
            </div>
            <div class="order-detail">
                <span>订单号：</span>
                <span id="orderId">ORDER_20241012_1234567890_1234</span>
            </div>
            <div class="order-detail">
                <span>支付金额：</span>
                <span id="paymentAmount">¥99.00</span>
            </div>
        </div>
        
        <div class="payment-methods">
            <div class="payment-method active" data-pay-source="WECHAT">
                <div class="payment-method-header">
                    <div class="payment-icon wechat-icon">微</div>
                    <div class="payment-name">微信支付</div>
                </div>
                <div class="qr-code-container">
                    <div class="qr-code" id="wechatQrCode">
                        <div class="loading"></div>
                    </div>
                    <div class="payment-tips">
                        请使用微信扫描二维码完成支付<br>
                        <span class="countdown" id="countdown">剩余时间：15:00</span>
                    </div>
                </div>
            </div>
            
            <div class="payment-method" data-pay-source="ALIPAY">
                <div class="payment-method-header">
                    <div class="payment-icon alipay-icon">支</div>
                    <div class="payment-name">支付宝</div>
                </div>
                <div class="qr-code-container">
                    <div class="qr-code" id="alipayQrCode">
                        <div class="loading"></div>
                    </div>
                    <div class="payment-tips">
                        请使用支付宝扫描二维码完成支付<br>
                        <span class="countdown" id="countdown2">剩余时间：15:00</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="payment-status status-pending" id="paymentStatus">
            <div class="loading"></div>
            等待支付中...
        </div>
        
        <div style="margin-top: 20px;">
            <button class="btn" onclick="refreshPayment()">刷新状态</button>
            <button class="btn" onclick="cancelPayment()" style="background: #6c757d; margin-left: 10px;">取消支付</button>
        </div>
    </div>

    <script>
        let currentOrderId = '';
        let countdownTimer = null;
        let statusTimer = null;
        let remainingTime = 900; // 15分钟 = 900秒
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 从URL参数获取订单ID
            const urlParams = new URLSearchParams(window.location.search);
            currentOrderId = urlParams.get('orderId') || 'ORDER_20241012_1234567890_1234';
            
            // 初始化支付页面
            initPaymentPage();
            
            // 开始倒计时
            startCountdown();
            
            // 开始轮询支付状态
            startStatusPolling();
        });
        
        // 初始化支付页面
        function initPaymentPage() {
            // 设置订单信息
            document.getElementById('orderId').textContent = currentOrderId;
            
            // 创建微信支付二维码
            createWechatPayment();
            
            // 绑定支付方式切换事件
            document.querySelectorAll('.payment-method').forEach(method => {
                method.addEventListener('click', function() {
                    switchPaymentMethod(this);
                });
            });
        }
        
        // 创建微信支付
        function createWechatPayment() {
            // 模拟API调用
            setTimeout(() => {
                const qrCode = document.getElementById('wechatQrCode');
                qrCode.innerHTML = '<img src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgZmlsbD0iI2ZmZiIvPjx0ZXh0IHg9IjEwMCIgeT0iMTAwIiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iMTQiIGZpbGw9IiMzMzMiIHRleHQtYW5jaG9yPSJtaWRkbGUiPuWKoOi9veWKoOi9vTwvdGV4dD48L3N2Zz4=" alt="微信支付二维码">';
            }, 1000);
        }
        
        // 创建支付宝支付
        function createAlipayPayment() {
            // 模拟API调用
            setTimeout(() => {
                const qrCode = document.getElementById('alipayQrCode');
                qrCode.innerHTML = '<img src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgZmlsbD0iI2ZmZiIvPjx0ZXh0IHg9IjEwMCIgeT0iMTAwIiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iMTQiIGZpbGw9IiMzMzMiIHRleHQtYW5jaG9yPSJtaWRkbGUiPuWKoOi9veWKoOi9vTwvdGV4dD48L3N2Zz4=" alt="支付宝二维码">';
            }, 1000);
        }
        
        // 切换支付方式
        function switchPaymentMethod(selectedMethod) {
            // 移除所有active类
            document.querySelectorAll('.payment-method').forEach(method => {
                method.classList.remove('active');
            });
            
            // 添加active类到选中的方式
            selectedMethod.classList.add('active');
            
            const paySource = selectedMethod.dataset.paySource;
            
            if (paySource === 'WECHAT') {
                createWechatPayment();
            } else if (paySource === 'ALIPAY') {
                createAlipayPayment();
            }
        }
        
        // 开始倒计时
        function startCountdown() {
            countdownTimer = setInterval(() => {
                remainingTime--;
                
                const minutes = Math.floor(remainingTime / 60);
                const seconds = remainingTime % 60;
                const timeString = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                document.getElementById('countdown').textContent = `剩余时间：${timeString}`;
                document.getElementById('countdown2').textContent = `剩余时间：${timeString}`;
                
                if (remainingTime <= 0) {
                    clearInterval(countdownTimer);
                    updatePaymentStatus('failed', '支付超时，请重新下单');
                }
            }, 1000);
        }
        
        // 开始轮询支付状态
        function startStatusPolling() {
            statusTimer = setInterval(() => {
                checkPaymentStatus();
            }, 3000); // 每3秒查询一次
        }
        
        // 检查支付状态
        function checkPaymentStatus() {
            // 模拟API调用
            fetch(`/pc/payment/status/${currentOrderId}`)
                .then(response => response.json())
                .then(data => {
                    if (data.code === 0) {
                        const status = data.data.paymentStatus;
                        if (status === 'SUCCESS') {
                            updatePaymentStatus('success', '支付成功！');
                            clearInterval(statusTimer);
                            clearInterval(countdownTimer);
                        } else if (status === 'FAILED') {
                            updatePaymentStatus('failed', '支付失败，请重试');
                            clearInterval(statusTimer);
                        }
                    }
                })
                .catch(error => {
                    console.error('查询支付状态失败:', error);
                });
        }
        
        // 更新支付状态
        function updatePaymentStatus(status, message) {
            const statusElement = document.getElementById('paymentStatus');
            statusElement.className = `payment-status status-${status}`;
            statusElement.innerHTML = message;
        }
        
        // 刷新支付状态
        function refreshPayment() {
            checkPaymentStatus();
        }
        
        // 取消支付
        function cancelPayment() {
            if (confirm('确定要取消支付吗？')) {
                clearInterval(countdownTimer);
                clearInterval(statusTimer);
                updatePaymentStatus('failed', '支付已取消');
            }
        }
        
        // 页面卸载时清理定时器
        window.addEventListener('beforeunload', function() {
            if (countdownTimer) clearInterval(countdownTimer);
            if (statusTimer) clearInterval(statusTimer);
        });
    </script>
</body>
</html>

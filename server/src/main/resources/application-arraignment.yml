# ============================================================
# 提审环境配置（application-arraignment.yml）
# 
# 适用场景：提交应用商店审核时使用的环境（和开发环境配置基本相同）
# 特点：Swagger 关闭、日志适中
# ============================================================

# ---------- MySQL 连接变量 ----------
mysql:
  host: your_arraignment_host           # 提审环境数据库 IP
  port: 3306                            # 数据库端口
  database: your_database               # 数据库名
  username: your_username               # 用户名
  password: 'your_password'             # 密码

# ---------- Redis 连接变量 ----------
redis:
  host: your_arraignment_host           # 提审环境 Redis IP
  port: 6379                            # Redis 端口
  password: ""                          # Redis 密码
  database: 0                           # 数据库编号


# ============================================================
# Spring 框架配置
# ============================================================
spring:
  application:
    name: server                        # 应用名称

  # ---------- 数据源 ----------
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource  # 连接池类型
    driver-class-name: com.mysql.cj.jdbc.Driver   # 数据库驱动
    url: jdbc:mysql://${mysql.host}:${mysql.port}/${mysql.database}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${mysql.username}
    password: ${mysql.password}
    druid:
      initial-size: 10                  # 初始连接数
      min-idle: 10                      # 最小空闲连接
      max-active: 100                   # 最大活跃连接
      max-wait: 60000                   # 等待超时
      validation-query: SELECT 1        # 连接检测 SQL
      test-while-idle: true             # 空闲检测

  # ---------- Redis ----------
  data:
    redis:
      host: ${redis.host}
      port: ${redis.port}
      password: ${redis.password}
      database: ${redis.database}
      timeout: 10000ms

  # ---------- Redisson ----------
  redis:
    redisson:
      config: |
        singleServerConfig:
          address: "redis://${redis.host}:${redis.port}"
          password: ${redis.password}
          database: ${redis.database}
          connectionPoolSize: 64
          connectionMinimumIdleSize: 24
        codec: !<org.redisson.client.codec.StringCodec> {}


# ============================================================
# MyBatis Plus 配置
# ============================================================
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml  # XML 映射文件位置
  type-aliases-package: com.ydzz.entity          # 实体类包


# ============================================================
# Sa-Token 认证配置
# ============================================================
sa-token:
  token-name: Authorization             # Token 请求头名称
  timeout: 259200                       # 有效期 3 天
  is-concurrent: true                   # 允许并发登录
  is-share: true                        # 共用 Token
  is-log: false                         # 提审环境关闭操作日志
  is-read-header: true                  # 从请求头读取


# ============================================================
# JetCache 缓存配置
# ============================================================
jetcache:
  remote:
    default:
      database: ${redis.database}
      type: redisson
      keyConvertor: fastjson2
      valueEncoder: java
      valueDecoder: java
      defaultExpireInMillis: 3600000    # 默认 1 小时过期
      keyPrefix: "jetcache:"
  local:
    default:
      type: caffeine
      keyConvertor: fastjson2
      expireAfterWriteInMillis: 3600000


# ============================================================
# Swagger 配置（提审环境关闭）
# ============================================================
springdoc:
  enabled: false                        # 提审时关闭接口文档


# ============================================================
# 健康检查配置
# ============================================================
health:
  check:
    interval-ms: 300000                 # 5 分钟


# ============================================================
# 日志配置（提审环境 — 适中）
# ============================================================
logging:
  level:
    # ------ 应用代码 ------
    com.ydzz: info                      # 应用日志

    # ------ Spring 框架 ------
    org.springframework: warn
    org.springframework.web: info
    org.springframework.boot: info

    # ------ 数据库 ------
    org.mybatis: info                   # SQL 日志
    org.springframework.jdbc: info
    org.springframework.transaction: info
    com.alibaba.druid: info

    # ------ 缓存 ------
    com.alicp.jetcache: info
    org.springframework.cache: info

    # ------ Redis ------
    org.redisson: warn
    org.springframework.data.redis: warn

    # ------ 认证 ------
    cn.dev33.satoken: info

    # ------ Web 容器 ------
    org.apache.catalina: warn

# ============================================================
# 主配置文件（application.yml）
# 
# 作用：项目的统一入口，只负责两件事：
#   1. 设置服务端口
#   2. 选择激活哪个环境的配置文件
# 
# 具体配置请到对应的 application-{环境}.yml 中修改
# ============================================================

# ---------- 服务器配置 ----------
server:
  port: 8660                            # 服务端口号

# ---------- 环境选择 ----------
spring:
  profiles:
    active: local-dev                    # 激活的环境，可选：local-dev | dev | prod | arraignment

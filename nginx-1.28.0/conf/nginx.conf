#user www www;                                # Windows 不支持 user 指令，已注释
worker_processes auto;
error_log logs/error.log crit;                 # Windows 相对路径（logs/ 在 nginx-1.28.0/ 下）
pid        logs/nginx.pid;                     # Windows 相对路径
worker_rlimit_nofile 51200;

# stream {
#     log_format tcp_format '$time_local|$remote_addr|$protocol|$status|$bytes_sent|$bytes_received|$session_time|$upstream_addr|$upstream_bytes_sent|$upstream_bytes_received|$upstream_connect_time';
#
#     access_log logs/tcp-access.log tcp_format;
#     error_log logs/tcp-error.log;
#     include /www/server/panel/vhost/nginx/tcp/*.conf;
# }

events {
    #use epoll;                                  # Windows 不支持 epoll，注释；默认 select 即可
    worker_connections 51200;
    multi_accept on;
}

http {
    include mime.types;
    #include luawaf.conf;                        # 原 Linux 宝塔配置已注释
    #include proxy.conf;                         # 原 Linux 宝塔配置已注释（Windows 目录不存在）
    #lua_package_path "/www/server/nginx/lib/lua/?.lua;;";   # 原 Lua 路径在 Windows 不存在，已注释

    default_type application/octet-stream;

    server_names_hash_bucket_size 512;
    client_header_buffer_size 32k;
    large_client_header_buffers 4 32k;
    client_max_body_size 50m;

    sendfile on;
    tcp_nopush on;

    keepalive_timeout 60;

    tcp_nodelay on;

    fastcgi_connect_timeout 300;
    fastcgi_send_timeout 300;
    fastcgi_read_timeout 300;
    fastcgi_buffer_size 64k;
    fastcgi_buffers 4 64k;
    fastcgi_busy_buffers_size 128k;
    fastcgi_temp_file_write_size 256k;
    fastcgi_intercept_errors on;

    gzip on;
    gzip_min_length 1k;
    gzip_buffers 4 16k;
    gzip_http_version 1.1;
    gzip_comp_level 5;
    gzip_types text/plain application/javascript application/x-javascript text/javascript text/css application/xml application/json image/jpeg image/gif image/png font/ttf font/otf image/svg+xml application/xml+rss text/x-js;
    gzip_vary on;
    gzip_proxied expired no-cache no-store private auth;
    gzip_disable "MSIE [1-6]\.";

    limit_conn_zone $binary_remote_addr zone=perip:10m;
    limit_conn_zone $server_name zone=perserver:10m;

    server_tokens off;
    access_log on;

    # ============================================================
    #  本地访问 http://localhost：
    #    - 静态资源由 admin-web/dist 提供（已拷到 nginx-1.28.0/html/）
    #    - /api/** 反向代理到本地 Java 后端 8660
    #    - SPA history 模式：未命中静态文件时 fallback 到 /index.html
    #  后端启动约定：spring-boot:run / jar 监听 0.0.0.0:8660
    # ============================================================
    server {
        listen       80 default_server;
        server_name  localhost;

        access_log   logs/localhost.access.log;

        # 前端静态根目录（nginx-1.28.0/html，dist 内容已在此）
        root   html;
        index  index.html;

        # 大文件 / 表单上传
        client_max_body_size 50m;

        # -------------------------- 后端接口反代 --------------------------
        # /api/** 全部转给 8660（保留路径前缀：/api/admin/auth/login -> http://127.0.0.1:8660/api/admin/auth/login）
        location /api/ {
            proxy_pass http://127.0.0.1:8660;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header X-Forwarded-Port  $server_port;

            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            proxy_redirect off;
            proxy_buffering on;
        }

        # -------------------------- 前端 SPA --------------------------
        # 优先匹配静态文件，找不到时 fallback 到 index.html（history 模式）
        location / {
            try_files $uri $uri/ /index.html;
        }

        # -------------------------- 自定义错误页 --------------------------
        error_page 404 /index.html;            # SPA 路由刷新时统一回 index.html
        error_page 502 503 504 /50x.html;      # 后端宕机时给个 nginx 默认错误页
    }

    server {

        listen 80;
        server_name dev.ydzz.cc;

        location / {
            root /www/wwwroot/dev.ydzz.cc;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
        # 接口代理，用于解决跨域问题
        location /down_info/ {
            # 跨域配置
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;

            # 处理预检请求
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With';
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            # 代理设置
            proxy_pass http://47.100.111.124:8660/game/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时设置
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # 其他代理配置
            proxy_redirect off;
            proxy_buffering on;
        }
    }
    #include /www/server/panel/vhost/nginx/*.conf;   # Windows 不存在该目录，已注释
}

